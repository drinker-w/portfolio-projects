server:
  port: 8080

spring:
  application:
    name: ai-qa-system

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_qa_db}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  # Redis配置（带开关，不可用时降级）
  redis:
    enabled: ${REDIS_ENABLED:true}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# 通义千问API配置
llm:
  api-key: ${DASHSCOPE_API_KEY:your_api_key_here}
  base-url: https://dashscope.aliyuncs.com
  model: qwen-turbo

# JWT配置
jwt:
  secret: ${JWT_SECRET:AiQASystemJwtSecretKey2026ForLocalDevMustBeAtLeast256BitsLong}
  expiration: 86400000

# 文件上传路径
file:
  upload-dir: /app/uploads

# 日志配置
logging:
  level:
    com.aiqa: debug
    com.baomidou.mybatisplus: debug
