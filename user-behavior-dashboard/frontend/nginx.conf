server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://backend:8081;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
